name: Build Windows Installer

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        shell: bash
        run: npm install

      - name: TypeScript compile
        shell: bash
        run: rm -rf build/ && npx tsc

      - name: Copy appx assets
        shell: bash
        run: cp -r assets/appx build

      - name: Build Windows installers
        shell: cmd
        run: builder-configs\build.win.bat --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: lumi-windows-installers
          path: dist/
          retention-days: 7